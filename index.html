<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses – Sampathirao Yoganandh</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #1A1816;
      color: #F0EDE8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
    }

    .profile-card {
      background-color: #24211E;
      border: 1px solid #3D3835;
      border-radius: 14px;
      padding: 48px 52px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .profile-photo {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 3px solid #E8834A;
      margin-bottom: 24px;
    }

    .profile-name {
      font-size: 1.6em;
      font-weight: bold;
      color: #F0EDE8;
      margin-bottom: 6px;
      text-transform: capitalize;
    }

    .profile-title {
      font-size: 1.05em;
      color: #E8C9A0;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .profile-branch {
      font-size: 0.93em;
      color: #C8C4BE;
      margin-bottom: 4px;
    }

    .profile-org {
      font-size: 0.95em;
      color: #9E9A94;
      margin-bottom: 32px;
    }

    .divider {
      width: 60px;
      height: 2px;
      background-color: #E8834A;
      margin: 0 auto 32px;
      border-radius: 2px;
    }

    .course-btn {
      display: inline-block;
      padding: 12px 36px;
      background-color: #E8834A;
      color: #1A1816;
      font-size: 0.98em;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      transition: background-color 0.2s;
    }

    .course-btn:hover {
      background-color: #F5A472;
    }

    .course-label {
      font-size: 0.85em;
      color: #6E6A64;
      margin-top: 12px;
    }

    .courses-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    .course-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #1E1B18;
      border: 1px solid #3D3835;
      border-radius: 10px;
      padding: 14px 18px;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .course-item:hover {
      border-color: #E8834A;
      background: #26221F;
    }

    .course-item-icon {
      font-size: 1.6em;
      flex-shrink: 0;
    }

    .course-item-info {
      text-align: left;
      flex: 1;
    }

    .course-item-name {
      font-size: 0.92em;
      font-weight: 700;
      color: #F0EDE8;
      margin-bottom: 3px;
    }

    .course-item-code {
      font-size: 0.78em;
      color: #9E9A94;
    }

    .course-item-arrow {
      color: #E8834A;
      font-size: 1.1em;
      flex-shrink: 0;
    }

    .coming-soon {
      opacity: 0.5;
      cursor: default;
      pointer-events: none;
    }

    .badge-soon {
      font-size: 0.7em;
      background: #3D3835;
      color: #9E9A94;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <div class="profile-card">
    <img class="profile-photo" src="profile.JPEG" alt="Sampathirao Yoganandh">
    <div class="profile-name">Sampathirao Yoganandh</div>
    <div class="profile-title">Assistant Professor</div>
    <div class="profile-branch">CSE (AI &amp; ML)</div>
    <div class="profile-org">ANITS Engineering College</div>
    <div class="divider"></div>
    <div class="courses-grid">
      <a class="course-item" href="courses.html">
        <div class="course-item-icon">☕</div>
        <div class="course-item-info">
          <div class="course-item-name">Java Programming Practices</div>
          <div class="course-item-code">23CM9201 · R23 Regulation · CSE (AI &amp; ML)</div>
        </div>
        <div class="course-item-arrow">→</div>
      </a>
      <a class="course-item coming-soon" href="#">
        <div class="course-item-icon">🐍</div>
        <div class="course-item-info">
          <div class="course-item-name">Python Programming <span class="badge-soon">Coming Soon</span></div>
          <div class="course-item-code">23CM9202 · R23 Regulation · CSE (AI &amp; ML)</div>
        </div>
        <div class="course-item-arrow">→</div>
      </a>
      <a class="course-item coming-soon" href="#">
        <div class="course-item-icon">🛠️</div>
        <div class="course-item-info">
          <div class="course-item-name">DevOps <span class="badge-soon">Coming Soon</span></div>
          <div class="course-item-code">23CM9205 · R23 Regulation · CSE (AI &amp; ML)</div>
        </div>
        <div class="course-item-arrow">→</div>
      </a>
    </div>

  </div>

</body>
</html>
